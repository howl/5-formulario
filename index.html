<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Practica formulario</title>
</head>

<body>
  <header>
    <h1>Practica de formularios</h1>
    <p>Hago la practica de los dos formularios en el mismo archivo</p>
  </header>
  <section>
    <article>
      <h2>Formulario 1</h2>
      <p>Registrarse en el club</p>
      <form action="">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Pon tu nombre"><br>
        <br>
        <label for="apellidos">Apellidos:</label>
        <input type="text" id="apellidos" name="apellidos" placeholder="Pon tus apellidos"><br>
        <br>
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" placeholder="Pon tu edad"><br>
        <br>
        <div>Sexo:
          <input type="radio" id="masculino" name="sexo">
          <label for="masculino">M</label>
          <input type="radio" id="femenino" name="sexo">
          <label for="femenino">F</label><br>
        </div><br>
        <label for="club">Me siento del club:</label>
        <input type="checkbox" id="club" name="club" value="si"><br>
        <br>
        <label for="sobre-ti">Cuéntanos sobre ti:</label><br>
        <textarea id="sobre-ti" name="sobre-ti" rows="10" cols="50" placeholder="Escribe aquí sobre ti"></textarea><br>
        <br>
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" placeholder="Pon tu correo electrónico"><br>
        <br>
        <label for="telefono">Telefono:</label>
        <input type="tel" if="telefono" name="telefono">
      </form>
    </article>
  </section>
</body>

</html>
